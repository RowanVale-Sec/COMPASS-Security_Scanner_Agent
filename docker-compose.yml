# =============================================================================
# COMPASS - Cloud Operations Management Platform for Application Security Systems
# =============================================================================
# Single entrypoint: the frontend (port 3000) and the API gateway (port 8094).
# All pipeline agents talk only on the internal compass-net. Per-request
# repos are cloned into the shared `compass-workspace` named volume and
# removed after the pipeline finishes.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Frontend (React + Vite, served by nginx)
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: compass-frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # API Gateway (FastAPI BFF)
  # ---------------------------------------------------------------------------

  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    container_name: compass-api-gateway
    depends_on:
      orchestrator:
        condition: service_healthy
    ports:
      - "8094:8094"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8093
      COMPASS_WORKSPACE_ROOT: /workspace
      COMPASS_ALLOWED_ORIGIN: http://localhost:3000
      COMPASS_CLONE_TIMEOUT_S: "300"
      COMPASS_MAX_REPO_BYTES: "524288000"  # 500 MB
    volumes:
      - compass-workspace:/workspace
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost', 8094), timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # MCP Servers
  # ---------------------------------------------------------------------------

  mitre-mcp:
    build:
      context: ./mcp_servers/mitre
      dockerfile: Dockerfile
    container_name: compass-mitre-mcp
    networks:
      - compass-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8000), timeout=2)\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  syft-mcp:
    build:
      context: .
      dockerfile: mcp_servers/syft/Dockerfile
    container_name: compass-syft-mcp
    volumes:
      # Syft reads the per-job clone from the shared workspace volume.
      - compass-workspace:/workspace:ro
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Scanner Agent
  # ---------------------------------------------------------------------------

  scanner-agent:
    build:
      context: .
      dockerfile: agents/scanner/Dockerfile
    container_name: compass-scanner-agent
    depends_on:
      mitre-mcp:
        condition: service_healthy
    volumes:
      - compass-workspace:/workspace:ro
    environment:
      COMPASS_MODE: server
      SCANNER_PORT: "8090"
      SCAN_FOLDER_PATH: /workspace
      MITRE_MCP_URL: http://mitre-mcp:8000/mcp
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Inventory Agent
  # ---------------------------------------------------------------------------

  inventory-agent:
    build:
      context: .
      dockerfile: agents/inventory/Dockerfile
    container_name: compass-inventory-agent
    depends_on:
      syft-mcp:
        condition: service_healthy
    volumes:
      - compass-workspace:/workspace:ro
    environment:
      COMPASS_MODE: server
      INVENTORY_PORT: "8091"
      SCAN_FOLDER_PATH: /workspace
      SYFT_MCP_URL: http://syft-mcp:8080
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Threat Model Agent
  # ---------------------------------------------------------------------------

  threat-model-agent:
    build:
      context: .
      dockerfile: agents/threat_model/Dockerfile
    container_name: compass-threat-model-agent
    environment:
      COMPASS_MODE: server
      THREAT_MODEL_PORT: "8092"
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Orchestrator
  # ---------------------------------------------------------------------------

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: compass-orchestrator
    depends_on:
      scanner-agent:
        condition: service_healthy
      inventory-agent:
        condition: service_healthy
      threat-model-agent:
        condition: service_healthy
    environment:
      COMPASS_MODE: server
      ORCHESTRATOR_PORT: "8093"
      SCANNER_URL: http://scanner-agent:8090
      INVENTORY_URL: http://inventory-agent:8091
      THREAT_MODEL_URL: http://threat-model-agent:8092
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  compass-net:
    driver: bridge

volumes:
  compass-workspace:
