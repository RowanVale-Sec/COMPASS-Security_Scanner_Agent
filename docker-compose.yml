version: '3.8'

# =============================================================================
# COMPASS - Cloud Operations Management Platform for Application Security Systems
# Unified Docker Compose for all agents and MCP servers
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MCP Servers
  # ---------------------------------------------------------------------------

  mitre-mcp:
    build:
      context: ./mcp_servers/mitre
      dockerfile: Dockerfile
    container_name: compass-mitre-mcp
    ports:
      - "8000:8000"
    networks:
      - compass-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8000), timeout=2)\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  syft-mcp:
    build:
      context: .
      dockerfile: mcp_servers/syft/Dockerfile
    container_name: compass-syft-mcp
    volumes:
      - ./test_targets/Flask-project-Test:/workspace:ro
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Scanner Agent
  # ---------------------------------------------------------------------------

  scanner-agent:
    build:
      context: .
      dockerfile: agents/scanner/Dockerfile
    container_name: compass-scanner-agent
    depends_on:
      mitre-mcp:
        condition: service_healthy
    volumes:
      - ./test_targets/Flask-project-Test:/scan:ro
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      COMPASS_MODE: server
      SCANNER_PORT: "8090"
      SCAN_FOLDER_PATH: /scan
      MITRE_MCP_URL: http://mitre-mcp:8000/mcp
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Inventory Agent
  # ---------------------------------------------------------------------------

  inventory-agent:
    build:
      context: .
      dockerfile: agents/inventory/Dockerfile
    container_name: compass-inventory-agent
    depends_on:
      syft-mcp:
        condition: service_healthy
    volumes:
      - ./test_targets/Flask-project-Test:/scan:ro
    ports:
      - "8091:8091"
    env_file: .env
    environment:
      COMPASS_MODE: server
      INVENTORY_PORT: "8091"
      SCAN_FOLDER_PATH: /scan
      SYFT_MCP_URL: http://syft-mcp:8080
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Threat Model Agent
  # ---------------------------------------------------------------------------

  threat-model-agent:
    build:
      context: .
      dockerfile: agents/threat_model/Dockerfile
    container_name: compass-threat-model-agent
    ports:
      - "8092:8092"
    env_file: .env
    environment:
      COMPASS_MODE: server
      THREAT_MODEL_PORT: "8092"
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Orchestrator Agent
  # ---------------------------------------------------------------------------

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: compass-orchestrator
    depends_on:
      scanner-agent:
        condition: service_healthy
      inventory-agent:
        condition: service_healthy
      threat-model-agent:
        condition: service_healthy
    ports:
      - "8093:8093"
    env_file: .env
    environment:
      COMPASS_MODE: server
      ORCHESTRATOR_PORT: "8093"
      SCANNER_URL: http://scanner-agent:8090
      INVENTORY_URL: http://inventory-agent:8091
      THREAT_MODEL_URL: http://threat-model-agent:8092
    networks:
      - compass-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  compass-net:
    driver: bridge
